# =============================================================================
# Nomogram Analysis Configuration
# Version: 1.0
#
# 参数说明：
#   [必填] - 必须手动配置
#   [可选] - 有默认值，可根据需要修改
# =============================================================================

# ----------------------------------------------------------------------------
# [必填] 输入文件设置
# ----------------------------------------------------------------------------
[input]
# 表达矩阵文件（绝对路径或相对于项目目录）
# 支持：绝对路径、相对于项目根目录的路径
data_file = test_data/GSE126124.dat.csv

# 分组文件
group_file = test_data/GSE126124.group.csv

# 基因列表文件
gene_file = test_data/04.gene.csv

# ----------------------------------------------------------------------------
# [必填] 输出目录设置
# ----------------------------------------------------------------------------
[output]
# 项目根目录（可留空自动推断）
project_dir =

# 主脚本路径
script_path = /media/desk16/share/secure/Nomogram/scripts/Nomogram.R

# ----------------------------------------------------------------------------
# [可选] 分析参数
# ----------------------------------------------------------------------------
[analysis]
# 校准曲线bootstrap次数
calibrate_b = 1000

# LRM最大迭代次数
lrm_maxit = 1000

# 比较组 (不指定则自动识别Normal vs 其他)
comparison =

# 输出文件前缀
prefix =

# ----------------------------------------------------------------------------
# [可选] 目录设置（相对于项目根目录）
# ----------------------------------------------------------------------------
[directories]
# 结果目录
result = results/Nomogram

# 日志目录
logs = logs

# 报告目录
report = report

# 测试数据目录
test_data = test_data

# ----------------------------------------------------------------------------
# [可选] 系统设置
# ----------------------------------------------------------------------------
[system]
# 随机种子
seed = 123
