# Prognosis 预后分析配置文件模板
# 使用方法: 复制此文件为 Prognosis.config.yaml 并修改参数

# ==================== 基本设置 ====================
project:
  name: "Prognosis"
  version: "1.0.0"
  description: "预后分析配置文件"

# ==================== 数据路径 ====================
data:
  # 表达矩阵文件
  expr_file: "expression.csv"
  # 分组文件
  group_file: "group.csv"
  # 生存数据文件
  survival_file: "survival.csv"
  # 基因列表文件
  gene_file: "genes.csv"

# ==================== 分析参数 ====================
analysis:
  # 随机种子
  seed: 123
  # p值截断值
  pval_cutoff: 0.05
  # Lasso交叉验证折数
  cv_folds: 10

# ==================== 输出设置 ====================
output:
  # 输出根目录
  root_dir: "result"
  # Cox结果目录
  cox_dir: "05_Cox"
  # 风险模型结果目录
  risk_dir: "06_RiskModel"
  # 报告输出目录
  report_dir: "report"
  # 日志目录
  log_dir: "logs"

# ==================== 图形设置 ====================
plot:
  # 图形宽度(英寸)
  width: 7
  # 图形高度(英寸)
  height: 7
  # DPI
  dpi: 300
  # PDF格式
  pdf: true
  # PNG格式
  png: true
