# 免疫浸润分析配置文件示例
# 方法编号: 1=cibersort, 2=epic, 3=estimate, 4=ips,
#           5=mcpcounter, 6=ssgsea, 7=timer, 8=xcell

[Methods]
# 选择要执行的方法(支持范围和逗号分隔)
# 示例1: 执行所有方法
# methods = 1-8
# 示例2: 仅执行前3个方法
# methods = 1,2,3
# 示例3: 执行第1、5、7个方法
# methods = 1,5,7
methods = 1-8

[Input]
# 表达矩阵文件(CSV格式,第一列为基因名SYMBOL) [必需]
expression = expr_tpm.csv

# 分组信息文件(CSV格式,包含sample和group列) [必需]
group = group.csv

# 基因列表文件(可选,用于与免疫细胞进行相关性分析)
# CSV格式,包含gene列
# 支持的方法: cibersort(1), epic(2), mcpcounter(5), ssgsea(6), timer(7), xcell(8)
genes = 

# ssGSEA基因签名文件(可选,但运行ssgsea(6)时必需)
# RDS格式,包含基因集
# 注意: 如果启用了ssgsea(6)但未提供此文件,程序会报错
signature = gene_signatures.rds

[Output]
# 输出基础目录
base_dir = immune_infiltration_results

# 是否为每个方法创建子目录
create_subdirs = true

[Execution]
# 是否启用并行执行
parallel_enabled = true

# 最大并行任务数(默认8核)
max_workers = 8

[Cache]
# 是否启用缓存(提高重复运行速度)
enabled = true

# 缓存目录（可留空）：运行时会自动设为 <Output.base_dir>/qs2
cache_dir =

# 是否强制重新计算(忽略缓存)
force = false

[Method1.CIBERSORT]
# CIBERSORT特有的参数
# 排列次数(默认1000,数值越大精度越高但越慢)
perm = 1000

[Method7.TIMER]
# TIMER特有的参数
# 组织类型(根据你的样本类型选择)
# 可选: LUAD(肺腺癌), LUSC(肺鳞癌), GBM(胶质瘤), 等
tissue = LUAD
