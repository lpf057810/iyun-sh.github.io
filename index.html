            function decodeBase64ToUtf8(base64) {
                var binary = atob(base64);
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            }

            var standardsFrame = document.getElementById('standards-frame');
            var flowFrame = document.getElementById('flow-frame');
            standardsFrame.srcdoc = decodeBase64ToUtf8(DOC_A_B64);
            flowFrame.srcdoc = decodeBase64ToUtf8(DOC_B_B64);

            var btns = document.querySelectorAll('.switch-btn');
            var pages = document.querySelectorAll('.page-wrap');
            var frames = document.querySelectorAll('.doc-frame');

            function resizeFrame(frame) {
                try {
                    var doc = frame.contentDocument || frame.contentWindow.document;
                    if (!doc || !doc.body) return;
                    var bodyHeight = doc.body.scrollHeight;
                    var htmlHeight = doc.documentElement ? doc.documentElement.scrollHeight : 0;
                    frame.style.height = Math.max(bodyHeight, htmlHeight, 720) + 'px';
                } catch (e) {
                    // Ignore sizing failures.
                }
            }

            for (var i = 0; i < frames.length; i++) {
                frames[i].addEventListener('load', function () {
                    resizeFrame(this);
                });
            }

            for (var j = 0; j < btns.length; j++) {
                btns[j].addEventListener('click', function () {
                    var target = this.getAttribute('data-target');

                    for (var k = 0; k < btns.length; k++) {
                        btns[k].classList.remove('active');
                    }
                    for (var m = 0; m < pages.length; m++) {
                        pages[m].classList.remove('active');
                    }

                    this.classList.add('active');
                    document.getElementById(target).classList.add('active');

                    var activeFrame = document.querySelector('#' + target + ' .doc-frame');
                    if (activeFrame) {
                        resizeFrame(activeFrame);
                    }
                });
            }

            window.addEventListener('resize', function () {
                for (var n = 0; n < frames.length; n++) {
                    resizeFrame(frames[n]);
                }
            });
        })();
    </script>
