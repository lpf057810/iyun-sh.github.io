; =============================================================================
; MR Analysis Configuration Template
; =============================================================================
; Copy this file to MR.config.ini and modify the values as needed
; Or use command line arguments to override these settings
; =============================================================================

[Analysis]
; MR analysis type: eqtl, pqtl, traditional
type = eqtl
; Timestamp format (auto uses YYYYMMDD_HHMMSS)
timestamp = auto

[Input]
; Gene list file (CSV format)
gene_list = /path/to/genes.csv

; For traditional MR, specify exposure type: selfharm, violence, or both
exposure_type = both

[Output]
; Base output directory
base_dir = ./output

; Create subdirectories for tables and figures
create_subdirs = 1

[Parameters]
; P-value threshold for SNP selection (GWAS significance)
pval_threshold = 5e-8

; P-value threshold for SNP filtering in colocalization
p_thresh = 0.05

; Gene region radius in kb (for colocalization)
region_radius_kb = 50

; Linkage disequilibrium threshold (r2)
r2_threshold = 0.001

; Distance in kb for clumping
kb_distance = 10000

; Minimum F-statistic for instrumental variables
min_f_stat = 10

; Minimum number of SNPs required
min_snps = 3

[Coloc]
; Enable colocalization analysis (0 or 1)
enabled = 0

; Posterior probability threshold for significant colocalization
pp4_threshold = 0.6

; Case prevalence for colocalization (for case-control studies)
case_prevalence = 0.4

[Advanced]
; Use proxies for GWAS data (0 or 1)
gwas_use_proxies = 0

; Enable SNP filtering before colocalization
use_snp_filter = 1

; MR-PRESSO number of simulations
mr_presso_n_sim = 1000
