; =============================================================================
; MR Analysis Configuration
; =============================================================================
; This file contains the default parameters for MR analysis
; Can be overridden by command line arguments
; =============================================================================

[Analysis]
type = eqtl
timestamp = auto

[Input]
; Gene list file - update this to your actual gene list
gene_list = /media/desk16/share/26YHB100F/03_Venn/01.Venn_gene.csv

; For traditional MR: selfharm, violence, or both
exposure_type = both

[Output]
; Output directory - relative to MR project root
base_dir = ../result

; Create subdirectories for tables and figures
create_subdirs = 1

[Parameters]
; P-value threshold for SNP selection (GWAS significance)
; Common values: 5e-8 (genome-wide), 1e-5 (suggestive)
pval_threshold = 5e-8

; P-value threshold for SNP filtering in colocalization
p_thresh = 0.05

; Gene region radius in kb (for colocalization)
region_radius_kb = 50

; Linkage disequilibrium threshold (r2)
; Lower values = stricter clumping (more independent SNPs)
r2_threshold = 0.001

; Distance in kb for clumping
; Common values: 10000 (default), 5000, 250
kb_distance = 10000

; Minimum F-statistic for instrumental variables
; Rule of thumb: F > 10 indicates strong instruments
min_f_stat = 10

; Minimum number of SNPs required for analysis
min_snps = 3

; EAF threshold - filter out SNPs with extreme allele frequencies
eaf_threshold = 0.01

; Outcome GWAS ID (OpenGWAS)
outcome_id = ebi-a-GCST90091033

; pQTL data directory (for pQTL analysis)
pqtl_dir = /media/desk16/iyunlpf/NAF/pqtl/data/cis_clump

[Coloc]
; Enable colocalization analysis (0 or 1)
enabled = 0

; Posterior probability threshold for significant colocalization
; PP4 > 0.6 is often considered suggestive
pp4_threshold = 0.6

; Case prevalence for colocalization (for case-control studies)
; Set to actual disease prevalence if known
case_prevalence = 0.4

[Advanced]
; Use proxies for GWAS data (0 or 1)
gwas_use_proxies = 0

; Enable SNP filtering before colocalization
use_snp_filter = 1

; MR-PRESSO number of simulations
mr_presso_n_sim = 1000
